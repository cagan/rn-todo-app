# ============================================================
# Claude Harness — Project Configuration
# ============================================================
# Bu dosya projeye özel TÜM değişkenleri tanımlar.
# Agent'lar, skill'ler ve hook'lar bu dosyadan okur.
# Yeni bir projeye taşırken SADECE bu dosyayı değiştir.
# ============================================================

# --- Proje Bilgileri ---
PROJECT_NAME="rn-todo-app"
PROJECT_LANG="typescript"
PROJECT_FRAMEWORK="react-native"
PROJECT_DESCRIPTION="React Native todo application with Expo"

# --- Komutlar (hook'lar ve skill'ler tarafından kullanılır) ---
CMD_TEST="npm test"
CMD_LINT="npm run lint"
CMD_TYPECHECK="npx tsc --noEmit"
CMD_DEV="npx expo start"
CMD_BUILD="eas build --platform ios"
CMD_FORMAT=""

# --- Dizin Yapısı ---
DIR_SRC="src/"
DIR_COMPONENTS="src/components/"
DIR_SCREENS="src/screens/"
DIR_HOOKS="src/hooks/"
DIR_SERVICES="src/services/"
DIR_STORE="src/store/"
DIR_TESTS="**/__tests__/"

# --- Dosya Uzantıları ---
FILE_EXT_SOURCE="ts,tsx"
FILE_EXT_TEST=".test.ts,.test.tsx"
FILE_GLOB_SOURCE="*.{ts,tsx}"

# --- Kod Kuralları ---
MAX_FUNCTION_LINES=30
MAX_FILE_LINES=150
TEST_COVERAGE_MIN=80
STRICT_MODE=true
NO_ANY=true
NO_CONSOLE_LOG=true

# --- Git Kuralları ---
COMMIT_FORMAT="conventional"
BRANCH_STRATEGY="feature"
MAIN_BRANCH="main"
PROTECTED_BRANCHES="main"

# --- Lint / Typecheck Patterns ---
LINT_CMD="npx eslint ${DIR_SRC}"
LINT_FILE_PATTERN="*.ts *.tsx"
CONSOLE_LOG_PATTERN="console\."
CONSOLE_LOG_INCLUDE="--include=*.ts --include=*.tsx"

# --- Dil (agent çıktı dili) ---
LANG_UI="tr"
